# Nota: aunque este archivo vive en apps/landing-web (Package directory del
# sitio), Netlify resuelve "publish" relativo a la RAÍZ del repo, no a esta
# carpeta. Ver ADR 0012.
[build]
  command = "pnpm build:landing"
  publish = "apps/landing-web/dist/browser"

[build.environment]
  NODE_VERSION = "20.19.0"
  PNPM_VERSION = "9.0.0"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/runtime-config.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
